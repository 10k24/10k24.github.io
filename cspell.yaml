version: 0.2
language: en
ignoreCase: true
ignorePaths:
  - node_modules
  - .idea
  - .github
dictionaries:
  - en_US
  - softwareTerms
  - companies
  - misc
  - personal
dictionaryDefinitions:
  - name: personal
    path: ./cspell.txt
flagWords:
  - brand
  - blacklist->blocklist, denylist
  - blacklists->blocklists, denylists
  - blackhat->malicious actor, attacker
  - cripples->slows down, hinders, obstructs
  - crippling->attenuating, incapacitating
  - dummy->placeholder, sample
  - girlfriend-test->user test, acceptance test
  - manhour->person-hour, staff hour
  - manhours->person-hours
  - man-in-the-middle->on-path attacker, intermediary
  - manned->crewed, staffed, human-operated
  - master->primary, leader, coordinator, main
  - masters->primaries, leaders, coordinators
  - middleman->intermediary, broker
  - mom-test->user test, acceptance test
  - sanity->coherence, verification
  - segregation->separation, segmentation
  - slave->secondary, follower, standby, replica, worker
  - slaves->secondaries, followers, standbys, replicas
  - whitelist->allowlist, permitlist
  - whitelists->allowlists, permitlists
ignoreRegExpList:
  - "<script[\\s\\S]*?<\\/script>"
files:
  - docs/**/*.html
useGitignore: true
